image: python:3.12-slim

stages:
  - lint
  - test

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .uv-cache/

default:
  before_script:
    - pip install uv
    - uv sync --all-groups

ruff:
  stage: lint
  script:
    - uv run ruff check src tests

mypy:
  stage: lint
  script:
    - uv run mypy src

pytest:
  stage: test
  script:
    - uv run pytest -v
