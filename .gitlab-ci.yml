stages:
  - lint
  - test
  - publish

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
  # Default interpreter; the pytest matrix overrides this per job.
  PYTHON_VERSION: "3.11"
  # Override the repository's .python-version pin so each matrix job tests
  # the interpreter shipped in its own image instead of downloading 3.11.
  UV_PYTHON: "${PYTHON_VERSION}"

image: python:${PYTHON_VERSION}-slim

cache:
  key: "$CI_COMMIT_REF_SLUG-$PYTHON_VERSION"
  paths:
    - .uv-cache/

default:
  before_script:
    - pip install uv
    - uv sync --all-extras --all-groups

ruff:
  stage: lint
  script:
    - uv run ruff check src tests
    - uv run ruff format --check src tests

mypy:
  stage: lint
  script:
    - uv run mypy src

pytest:
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.11", "3.12", "3.13"]
  script:
    - uv run pytest -v --cov=any_to_markdown --cov-report=term --cov-report=xml
  coverage: '/TOTAL.*\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# Publishes to PyPI on version tags (e.g. v0.3.0) via Trusted Publishing:
# no long-lived API token is stored in CI. Configure the trusted publisher
# on PyPI first (see README, "Releasing").
publish:
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  script:
    - uv build
    - uv publish --trusted-publishing always
